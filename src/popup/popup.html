<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="app">
      <header>
        <div class="brand">
          <span class="logo"></span>
          <span>Almost Video Feedback</span>
        </div>
        <span id="state-pill" class="pill idle">Idle</span>
      </header>

      <div class="meter">
        <span class="meter-icon">🎤</span>
        <div class="meter-track"><div id="meter-fill" class="meter-fill"></div></div>
        <span id="meter-label" class="meter-label muted">checking mic…</span>
      </div>

      <div id="error-banner" class="banner error" hidden></div>

      <div id="live" class="live" hidden>
        <div class="live-row">
          <span class="rec-dot"></span>
          <span id="shots">0 shots</span>
        </div>
        <div class="hint muted">Talk through your feedback. Click, select text, scroll, or circle the mouse around things — screenshots are captured automatically.</div>
      </div>

      <button id="primary" class="primary">Start recording</button>
      <button id="force" class="secondary" hidden>📸 Force screenshot</button>
      <button id="import-loom" class="secondary" hidden>🎬 Import this Loom video</button>
      <div id="import-progress" class="hint muted" hidden></div>

      <div id="result" class="result" hidden>
        <div class="result-title">✅ Recording saved</div>
        <div id="result-meta" class="muted"></div>
        <div class="copied">📋 Copied to your clipboard — paste into your AI</div>
        <div class="result-actions">
          <button id="copy" class="primary small">Copy again</button>
          <button id="view" class="secondary small">🎬 View &amp; share</button>
          <button id="discard" class="secondary small danger">🗑 Delete</button>
        </div>
      </div>

      <div id="recent" class="recent" hidden>
        <div class="recent-title">Recent recordings</div>
        <div id="recent-list" class="recent-list"></div>
      </div>

      <footer>
        <button id="recordings" class="link">🎥 Recordings</button>
        <span class="muted">·</span>
        <button id="options" class="link">Settings</button>
        <span class="muted">·</span>
        <button id="shortcuts" class="link">Hotkeys</button>
      </footer>
    </div>
    <script src="../common/protocol.js"></script>
    <script src="../background/session-store.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
