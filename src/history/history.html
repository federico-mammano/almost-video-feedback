<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Recordings — Almost Video Feedback for AI</title>
    <link rel="stylesheet" href="history.css" />
  </head>
  <body>
    <div class="page">
      <header class="top">
        <div class="brand">
          <span class="logo"></span>
          <h1>Recordings</h1>
        </div>
        <div class="top-actions">
          <span id="count" class="muted"></span>
          <button id="clear" class="btn danger" hidden>Clear all</button>
        </div>
      </header>

      <div id="empty" class="empty" hidden>
        <div class="empty-emoji">🎙️</div>
        <p>No recordings yet.<br />Start one from the toolbar button, talk through your feedback, then stop.</p>
      </div>

      <div id="list" class="list"></div>
    </div>

    <script src="../background/exporter.js"></script>
    <script src="../background/session-store.js"></script>
    <script src="../common/zip.js"></script>
    <script src="history.js"></script>
  </body>
</html>
